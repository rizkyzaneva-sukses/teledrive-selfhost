<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TeleDrive Selfhost</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Telegram-backed storage</p>
          <h1>TeleDrive Selfhost</h1>
        </div>
        <div class="status" id="status">Checking</div>
      </section>

      <section class="workspace">
        <aside class="sidebar">
          <label class="token">
            Admin token
            <input id="tokenInput" type="password" autocomplete="current-password" placeholder="Opsional jika ADMIN_TOKEN kosong">
          </label>
          <button class="folder-root" id="rootButton" type="button">My Drive</button>
          <nav class="folder-tree" id="folderTree"></nav>
        </aside>

        <section class="main-panel">
          <section class="drive-toolbar">
            <div>
              <div class="breadcrumb" id="breadcrumb"></div>
              <h2 id="currentTitle">My Drive</h2>
              <p class="destination" id="destinationText">Upload masuk ke My Drive</p>
            </div>
            <div class="toolbar-actions">
              <button class="secondary" id="upButton" type="button">Up</button>
              <button class="secondary" id="refreshButton" type="button">Refresh</button>
            </div>
          </section>

          <form class="upload" id="uploadForm">
            <label class="dropzone" for="fileInput">
              <input id="fileInput" type="file" required>
              <span id="fileLabel">Pilih file untuk upload</span>
            </label>

            <button type="submit" id="uploadButton">Upload ke My Drive</button>
            <p class="message" id="message"></p>
          </form>

          <section class="files">
            <div class="files-head">
              <form class="new-folder" id="folderForm">
                <input id="newFolderInput" type="text" autocomplete="off" placeholder="Nama folder baru">
                <button class="secondary" type="submit">New Folder</button>
              </form>
            </div>
            <div class="filters">
              <input id="searchInput" type="search" placeholder="Search file dan folder">
              <div class="type-filters" id="typeFilters" aria-label="Filter tipe file">
                <button class="active" type="button" data-type-filter="all">All</button>
                <button type="button" data-type-filter="image">Images</button>
                <button type="button" data-type-filter="video">Videos</button>
                <button type="button" data-type-filter="document">Docs</button>
                <button type="button" data-type-filter="other">Other</button>
              </div>
            </div>
            <div class="summary" id="summaryText">0 file</div>
            <div class="folder-list" id="folderList"></div>
            <div class="file-list" id="fileList"></div>
          </section>
        </section>
      </section>
    </main>

    <div class="preview-modal" id="previewModal" aria-hidden="true">
      <div class="preview-backdrop" data-preview-close></div>
      <section class="preview-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
        <header class="preview-head">
          <div>
            <h3 id="previewTitle">Preview</h3>
            <p id="previewMeta"></p>
          </div>
          <button class="secondary" type="button" data-preview-close>Close</button>
        </header>
        <div class="preview-body" id="previewBody"></div>
        <footer class="preview-foot">
          <a id="previewOpen" target="_blank" rel="noreferrer">Open tab</a>
          <a id="previewDownload" target="_blank" rel="noreferrer">Download</a>
        </footer>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
